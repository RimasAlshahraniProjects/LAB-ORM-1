{% extends 'main/base.html' %}
{% load static %}
{% block title %} Create New Post | ROAM {% endblock %}

{% block content %}
<main class="create-container">
    <div class="form-card">
        <header class="form-header">
            <h2>Add New Post</h2>
            <p>Share your latest journey with the world.</p>
        </header>

        <form action="{% url 'main:create_post_view' %}" method="POST" class="post-form">
            {% csrf_token %}
            
            <div class="input-group">
                <label for="title">Post Title</label>
                <input type="text" name="title" id="title" placeholder="Enter a catchy title" required>
            </div>

            <div class="input-group">
                <label for="content">Content</label>
                <textarea name="content" id="content" rows="8" placeholder="Write your story here..." required></textarea>
            </div>

            <div class="switch-group">
                <input type="checkbox" name="is_published" id="is_published" checked>
                <label for="is_published">Publish immediately</label>
            </div>

            <div class="form-actions">
                <a href="{% url 'main:home_view' %}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Post now</button>
            </div>
        </form>
    </div>
</main>
{% endblock %}
